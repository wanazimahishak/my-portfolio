<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>好きな食べ物</title>
    <link rel="stylesheet" href="style.css">   

</head>

<body>

<header>
    <h1>🍱 好きな食べ物 ❣</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="food.html">好きな食べ物</a></li>
        <li><a href="event.html">イベント参加</a></li>
        <li><a href="travel.html">旅行</a></li>
        <li><a href="bucket.html">やりたいこと</a></li>
    </ul>
</nav>

<div class="container">
    <main>       
         <!-- decorative divider -->
        <div class="divider">
            <img src="images/Others/divider.jpg" alt="divider" class="divider">
        </div>
    
        <p class="flip-hint">🖱️ 写真をクリックすると説明が見えます</p>
               
        <div class="food-grid">

            <!-- Soba -->
            <label class="flip-card">
                <input type="checkbox">
                <div class="flip-inner">
                    <div class="flip-front">
                        <img src="images/food/zaru-soba.jpg" alt="Soba">
                        <div class="food-name">🍜 Soba</div>
                    </div>
                    <div class="flip-back">
                        <h3>🍜 Soba</h3>
                        <p>寒い日には、冷たくてさっぱりしたざるそばを味わうのも最高です。中でも、コシのあるそばを濃いめのつゆでいただくのが私のお気に入りです。</p>
                    </div>
                </div>
            </label>

            <!-- Sushi -->
            <label class="flip-card">
                <input type="checkbox">
                <div class="flip-inner">
                    <div class="flip-front">
                        <img src="images/food/salmon.jpg" alt="Sushi">
                        <div class="food-name">🍣 Sushi</div>
                    </div>
                    <div class="flip-back">
                        <h3>🍣 Sushi</h3>
                        <p>地元の魚市場で味わった新鮮なお寿司は、一生忘れられない体験です。特に、とろっと甘いサーモン寿司は私の"永遠の推し"なんです。</p>
                    </div>
                </div>
            </label>            
           
            <!-- Nasi Lemak -->
            <label class="flip-card">
                <input type="checkbox">
                <div class="flip-inner">
                    <div class="flip-front">
                        <img src="images/food/nasilemak.webp" alt="ナシレマッ">
                        <div class="food-name">🍛 Nasi Lemak</div>
                    </div>
                    <div class="flip-back">
                        <h3>🍛 Nasi Lemak</h3>
                        <p>マレーシアで食べたナシレマッは、まさに"幸せの一皿"。ココナッツミルク香るふわふわご飯とピリ辛サンバルの組み合わせは、私の心を一瞬でつかんじゃいました。</p>
                    </div>
                </div>
            </label>

            <!-- Sate -->
            <label class="flip-card">
                <input type="checkbox">
                <div class="flip-inner">
                    <div class="flip-front">
                        <img src="images/food/sate.jpg" alt="サテ">
                        <div class="food-name">🍢 Sate</div>
                    </div>
                    <div class="flip-back">
                        <h3>🍢 Sate</h3>
                        <p>炭火で焼けたお肉に甘辛いピーナッツソースをつけた瞬間、もう完全にノックアウト。ふわっとしたナシインピットと一緒に食べるのは絶対外せないんです。</p>
                    </div>
                </div>
            </label>

            <!-- kimchi -->
              <label class="flip-card">
                <input type="checkbox">
                <div class="flip-inner">
                    <div class="flip-front">
                        <img src="images/food/kimchi.jpg" alt="キムチ">
                        <div class="food-name">🍢 Kimchi</div>
                    </div>
                    <div class="flip-back">
                        <h3>🥬 Kimchi</h3>
                        <p>キムチって、ただの漬物じゃないんです。食べた瞬間、ピリ辛くて酸っぱくて、なんか止まらなくなる。時間が経つほど味が深くなるのも、もう反則レベル。キムチなしの生活？考えられないんです。</p>
                    </div>
                </div>
            </label>

            <!--rice cakes -->
              <label class="flip-card">
                <input type="checkbox">
                <div class="flip-inner">
                    <div class="flip-front">
                        <img src="images/food/rice-cakes.jpg" alt="トッポッキ">
                        <div class="food-name">🍢 Tteokbokki </div>
                    </div>
                    <div class="flip-back">
                        <h3>🍡 Tteokbokki</h3>
                        <p>トッポッキって、もちもちして 甘辛（あまから）くて、食（た）べ 始（はじ）めたら 絶対（ぜったい） 止（と）まらない。一口（ひとくち）食（た）べたら、もう 次（つぎ）が 欲（ほ）しくなる。みなさん、トッポッキを 食（た）べたことありますか？</p>
                    </div>
                </div>
            </label>


        </div>        
    </main>
</div>

</html>
