<div class ="container">

	<!-- decorative divider -->

	<p class="main-desc"> ワクワクする夢リスト。
		<br>夢、目標、やりたいこと。一緒にチェックしていこう！。</p>

	 <div class="divider">
       <img src="images/Others/divider.jpg" alt="divider" class="divider">
    </div>	
		

		<div class="gallery-section">
			<h2>🌸 2026 Bucket Lists</h2>
		</div>		

		<div class ="intro-card ">
			<div class="bucket-item">
  				<input type="checkbox" id="cb1" onchange="toggle(this)"/>
 				<label for="cb1">🏔️ スイスの田舎を訪れる</label>

			<div class="bucket-item">
				<input type="checkbox" id="cb3" onchange="toggle(this)"/>
				<label for="cb3">🇯🇵 日本語を学ぶ</label>
			</div>
			<div class="bucket-item">
				<input type="checkbox" id="cb4" onchange="toggle(this)" />
				<label for="cb4">📜 JLPT N1に合格する</label>
			</div>
			<div class="bucket-item">
				<input type="checkbox" id="cb5" onchange="toggle(this)" />

			</div>
			<div class="bucket-item">
				<input type="checkbox" id="cb6" onchange="toggle(this)"/>

			</div>	
		</div>		
			
	</main>	

	<footer>
		<p>&copy; 2026 ワンアジマ. All rights reserved. </p>
	</footer>

	<script>
		function toggle(checkbox) {
			checkbox.parentElement.classList.toggle('done');

			// Save this specific checkbox state
    		localStorage.setItem(checkbox.id, checkbox.checked);
		}

		 // Load all saved states on page load
		function loadStates() {
			const checkboxes = document.querySelectorAll('.bucket-item input[type="checkbox"]');
			
			checkboxes.forEach(checkbox => {
			// Get saved state from localStorage
			const isChecked = localStorage.getItem(checkbox.id) === 'true';
			
			if (isChecked) {
				checkbox.checked = true;
				checkbox.parentElement.classList.add('done');
			}
			});
		 }

		// Run when page loads
		window.addEventListener('DOMContentLoaded', loadStates);
	</script>

</body>
